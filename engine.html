<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async () => {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(1, 1, 1, 1); // Solid white void

            // Lighting: Top FFFFFF, Bottom DDDDDD
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.groundColor = new BABYLON.Color3(0.86, 0.86, 0.86); // #DDDDDD

            // Floor: No specular, pure white
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 50, height: 50}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(1, 1, 1);
            groundMat.specularColor = new BABYLON.Color3(0, 0, 0); // No specular
            ground.material = groundMat;

            // WebXR Setup
            const xr = await scene.createDefaultXRExperienceAsync({ floorMeshes: [ground] });

            // Attach spheres to controllers
            xr.input.onControllerAddedObservable.add((controller) => {
                controller.onMotionControllerInitObservable.add((motionController) => {
                    // Create the 0.5 unit sphere (diameter 0.5)
                    const sphere = BABYLON.MeshBuilder.CreateSphere("sphere", {diameter: 0.5}, scene);
                    const mat = new BABYLON.StandardMaterial("sphereMat", scene);
                    mat.diffuseColor = new BABYLON.Color3(0, 0, 0);
                    mat.specularColor = new BABYLON.Color3(0, 0, 0); // No specular
                    sphere.material = mat;
                    
                    // Attach to controller grip
                    sphere.setParent(controller.grip);
                });
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => { scene.then(s => s.render()); });
    </script>
</body>
</html>
