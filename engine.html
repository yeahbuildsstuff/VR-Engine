<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Yeahplays HTML VR Engine</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
    }
    #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
    }
    #waiting {
        position: fixed;
        inset: 0;
        background: black;
        color: white;
        font-family: monospace;
        font-size: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }
</style>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>

<body>
<canvas id="renderCanvas"></canvas>
<div id="waiting">Waiting For VR Headset</div>

<script>
const canvas = document.getElementById("renderCanvas");
const waiting = document.getElementById("waiting");

let engine, scene;
let vrSupported = false;
let pcMode = false;

let leftStickX = 0;
let leftStickY = 0;

async function init() {
    vrSupported = await BABYLON.WebXRSessionManager.IsSessionSupportedAsync("immersive-vr");

    if (!vrSupported) {
        waiting.style.display = "flex";
    } else {
        waiting.style.display = "none";
        startVRMode();
    }
}

window.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "p") {
        pcMode = true;
        waiting.style.display = "none";
        startPCMode();
    }
});

function startPCMode() {
    engine = new BABYLON.Engine(canvas, true);
    scene = new BABYLON.Scene(engine);

    const camera = new BABYLON.UniversalCamera("pcCam", new BABYLON.Vector3(0, 1.7, 0), scene);
    camera.attachControl(canvas, true);

    camera.keysUp.push("w".charCodeAt(0));
    camera.keysDown.push("s".charCodeAt(0));
    camera.keysLeft.push("a".charCodeAt(0));
    camera.keysRight.push("d".charCodeAt(0));
    camera.speed = 0.1;

    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);
    BABYLON.MeshBuilder.CreateGround("ground", {width:20, height:20}, scene);

    engine.runRenderLoop(() => scene.render());
}

async function startVRMode() {
    engine = new BABYLON.Engine(canvas, true);
    scene = new BABYLON.Scene(engine);

    const previewCamera = new BABYLON.UniversalCamera("preview", new BABYLON.Vector3(0,1.7,0), scene);

    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:20, height:20}, scene);
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    const xr = await scene.createDefaultXRExperienceAsync({
        floorMeshes: [ground]
    });

    const xrCamera = xr.baseExperience.camera;
    const xrOrigin = xrCamera.parent;

    const leftHand = BABYLON.MeshBuilder.CreateSphere("leftHand", {diameter:0.1}, scene);
    const rightHand = BABYLON.MeshBuilder.CreateSphere("rightHand", {diameter:0.1}, scene);
    leftHand.isVisible = false;
    rightHand.isVisible = false;

    xr.input.onControllerAddedObservable.add((controller) => {
        controller.onMotionControllerInitObservable.add((motionController) => {
            const handedness = motionController.handedness;
            const axes = motionController.getComponent("xr-standard-thumbstick");

            if (axes && handedness === "left") {
                axes.onAxisValueChangedObservable.add((values) => {
                    leftStickX = values.x;
                    leftStickY = values.y;
                });
            }

            if (handedness === "left") {
                leftHand.isVisible = true;
                if (controller.grip) leftHand.setParent(controller.grip);
            }

            if (handedness === "right") {
                rightHand.isVisible = true;
                if (controller.grip) rightHand.setParent(controller.grip);
            }
        });
    });

    engine.runRenderLoop(() => {
        previewCamera.position.copyFrom(xrCamera.position);
        previewCamera.rotation.copyFrom(xrCamera.rotation);

        const speed = 0.05;

        const forward = xrCamera.getDirection(BABYLON.Axis.Z).scale(-1);
        const right = xrCamera.getDirection(BABYLON.Axis.X);

        forward.y = 0;
        right.y = 0;
        forward.normalize();
        right.normalize();

        const move = forward.scale(leftStickY * speed)
            .add(right.scale(leftStickX * speed));

        xrOrigin.position.addInPlace(move);

        scene.render();
    });
}

init();
</script>
</body>
</html>
