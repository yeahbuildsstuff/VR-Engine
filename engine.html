<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

<script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    const createScene = async () => {
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.917, 0.960, 1.0, 1.0);

        const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
        light.groundColor = new BABYLON.Color3(0.86, 0.86, 0.86);
        light.specular = new BABYLON.Color3(0, 0, 0);

        const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 60, height: 60}, scene);
        const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
        groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.2);
        groundMat.specularColor = new BABYLON.Color3(0, 0, 0);
        ground.material = groundMat;

        const xr = await scene.createDefaultXRExperienceAsync({
            floorMeshes: [ground],
            disableTeleportation: true
        });

        // Setup Hands
        xr.input.onControllerAddedObservable.add((controller) => {
            // Make default controllers invisible
            controller.onMeshLoadedObservable.add((mesh) => { mesh.isVisible = false; });
            
            controller.onMotionControllerInitObservable.add((motionController) => {
                const sphere = BABYLON.MeshBuilder.CreateSphere("sphere", {diameter: 0.125}, scene);
                const mat = new BABYLON.StandardMaterial("mat", scene);
                mat.diffuseColor = new BABYLON.Color3(0.933, 0.933, 0.933);
                mat.specularColor = new BABYLON.Color3(0, 0, 0);
                sphere.material = mat;
                sphere.setParent(controller.grip);
            });
        });

        // Movement & Rotation Logic
        scene.onBeforeRenderObservable.add(() => {
            xr.input.controllers.forEach((controller) => {
                if (!controller.inputSource.gamepad) return;
                const axes = controller.inputSource.gamepad.axes;
                const handedness = controller.inputSource.handedness;

                // Left Controller: Movement relative to its own Y rotation
                if (handedness === "left" && (Math.abs(axes[2]) > 0.1 || Math.abs(axes[3]) > 0.1)) {
                    const orientation = controller.grip.getWorldMatrix().getRotationQuaternion();
                    const forward = BABYLON.Vector3.TransformCoordinates(new BABYLON.Vector3(0, 0, 1), BABYLON.Matrix.FromQuaternion(orientation));
                    const right = BABYLON.Vector3.TransformCoordinates(new BABYLON.Vector3(1, 0, 0), BABYLON.Matrix.FromQuaternion(orientation));
                    
                    forward.y = 0; forward.normalize();
                    right.y = 0; right.normalize();
                    const move = forward.scale(-axes[3] * 0.05).add(right.scale(axes[2] * 0.05));
                    xr.input.xrCamera.position.addInPlace(move);
                }

                // Right Controller: Smooth Rotation
                if (handedness === "right" && Math.abs(axes[2]) > 0.1) {
                    xr.input.xrCamera.rotation.y += axes[2] * 0.05;
                }
            });
        });

        return scene;
    };

    createScene().then((scene) => {
        engine.runRenderLoop(() => { scene.render(); });
    });
</script>
</body>
</html>
