<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

<script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    const createScene = async () => {
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.917, 0.960, 1.0, 1.0); // #eaf5ff

        const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
        light.groundColor = new BABYLON.Color3(0.86, 0.86, 0.86);
        light.specular = new BABYLON.Color3(0, 0, 0);

        // Dark Grey Floor (30ft x 30ft = 60 units x 60 units)
        const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 60, height: 60}, scene);
        const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
        groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.2); // Dark Grey
        groundMat.specularColor = new BABYLON.Color3(0, 0, 0);
        ground.material = groundMat;

        // VR Setup (Enabled hands back)
        const xr = await scene.createDefaultXRExperienceAsync({
            floorMeshes: [ground],
            disableDefaultHandMesh: false 
        });

        // Joystick Movement Logic
        scene.onBeforeRenderObservable.add(() => {
            const inputSource = xr.input.xrCamera;
            xr.input.controllers.forEach((controller) => {
                if (controller.inputSource.gamepad) {
                    const axes = controller.inputSource.gamepad.axes;
                    if (axes[2] !== 0 || axes[3] !== 0) {
                        const forward = inputSource.getDirection(new BABYLON.Vector3(0, 0, 1));
                        const right = inputSource.getDirection(new BABYLON.Vector3(1, 0, 0));
                        
                        forward.y = 0; forward.normalize();
                        right.y = 0; right.normalize();

                        const speed = 0.05;
                        const move = forward.scale(axes[3] * -speed).add(right.scale(axes[2] * speed));
                        inputSource.position.addInPlace(move);
                    }
                }
            });
        });

        return scene;
    };

    createScene().then((scene) => {
        engine.runRenderLoop(() => { scene.render(); });
    });
</script>
</body>
</html>
