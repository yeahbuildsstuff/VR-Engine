<!DOCTYPE html>
<html>
<head>
     <script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
  

<script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    const createScene = async () => {
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(1, 1, 1, 1);

        // Simple light
        const light = new BABYLON.HemisphericLight("Hemi", new BABYLON.Vector3(0, 1, 0), scene);
        
        // Simple Floor
        const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 10, height: 10}, scene);
        const mat = new BABYLON.StandardMaterial("mat", scene);
        mat.diffuseColor = new BABYLON.Color3(0.5, 0.5, 0.5); // Gray to ensure we see it
        ground.material = mat;

        // Ultra-basic VR setup (No extra features)
        const xr = await scene.createDefaultXRExperienceAsync({
            uiOptions: { sessionMode: 'immersive-vr' }
        });

        // Attach controller spheres (Using the input source observable)
        xr.input.onControllerAddedObservable.add((controller) => {
            controller.onMotionControllerInitObservable.add((motionController) => {
                const sphere = BABYLON.MeshBuilder.CreateSphere("s", {diameter: 0.5}, scene);
                sphere.setParent(controller.grip);
            });
        });

        return scene;
    };

    createScene().then((scene) => {
        engine.runRenderLoop(() => {
            scene.render();
        });
    });
</script>
</body>
</html>
