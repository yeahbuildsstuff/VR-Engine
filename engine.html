<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

<script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);

    const createScene = async () => {
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(1, 1, 1, 1); // Solid white void

        // Lighting: Top #FFFFFF, Bottom #DDDDDD, No Specular
        const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
        light.diffuse = new BABYLON.Color3(1, 1, 1);
        light.groundColor = new BABYLON.Color3(0.86, 0.86, 0.86);
        light.specular = new BABYLON.Color3(0, 0, 0); 

        // Floor: White, no specular
        const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 50, height: 50}, scene);
        const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
        groundMat.diffuseColor = new BABYLON.Color3(1, 1, 1);
        groundMat.specularColor = new BABYLON.Color3(0, 0, 0);
        ground.material = groundMat;

        // VR Setup
        const xr = await scene.createDefaultXRExperienceAsync({
            floorMeshes: [ground],
            disableDefaultHandMesh: true
        });

        // Controller Spheres
        xr.input.onControllerAddedObservable.add((controller) => {
            // Hide default models
            controller.inputSource.profiles = [];
            
            controller.onMotionControllerInitObservable.add((motionController) => {
                // Sphere diameter: 0.25 units = 1.5 inches (based on 1 unit = 6 inches)
                const sphere = BABYLON.MeshBuilder.CreateSphere("sphere", {diameter: 0.25}, scene);
                const mat = new BABYLON.StandardMaterial("sphereMat", scene);
                
                // Flat black material, no specular
                mat.diffuseColor = new BABYLON.Color3(0, 0, 0);
                mat.specularColor = new BABYLON.Color3(0, 0, 0);
                mat.emissiveColor = new BABYLON.Color3(0, 0, 0);
                sphere.material = mat;
                
                sphere.setParent(controller.grip);
            });
        });

        return scene;
    };

    createScene().then((scene) => {
        engine.runRenderLoop(() => {
            scene.render();
        });
    });
</script>
</body>
</html>
